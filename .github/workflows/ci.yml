name: CI - MLflow Training & Docker

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Python ──────────────────────────────
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      # ── 3. Install dependencies ───────────────────────
      - name: Install dependencies
        run: |
          pip install mlflow==2.19.0 scikit-learn pandas numpy matplotlib seaborn conda-pack

      # ── 3.1 Clean mlruns ──────────────────────────────
      - name: Clean mlruns
        run: |
          rm -rf mlruns outputs

      # ── 4. Run MLflow Project ─────────────────────────
      - name: Run MLflow Project
        run: |
          cd MLProject
          python modelling.py \
            --n_estimators 200 \
            --max_depth 0 \
            --min_samples_split 2

      # ── 5. Upload artefak ke GitHub ───────────────────
      - name: Upload MLflow artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: |
            mlruns/
            outputs/

      # ── 6. Commit artefak ke repo ─────────────────────
      - name: Commit artifacts to repository
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add mlruns/ outputs/ || true
          git diff --staged --quiet || git commit -m "Auto: update mlflow artifacts"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 7. Setup Docker Buildx ────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 8. Login ke Docker Hub ────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── 9. Build Docker Image dengan MLflow ──────────
      - name: Build Docker Image
        run: |
          mlflow models build-docker \
            --model-uri "mlruns/0/$(ls mlruns/0 | grep -v meta | head -1)/artifacts/model" \
            --name ${{ secrets.DOCKER_USERNAME }}/credit-risk-model:latest

      # ── 10. Push ke Docker Hub ────────────────────────
      - name: Push Docker Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/credit-risk-model:latest