name: CI - MLflow Training & Docker

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install mlflow==2.16.0 scikit-learn pandas numpy matplotlib seaborn

      - name: Clean mlruns
        run: |
          rm -rf mlruns outputs MLProject/mlruns MLProject/outputs

      - name: Run Training
        env:
          MLFLOW_RUN_ID: ""
        run: |
          unset MLFLOW_RUN_ID || true
          mlflow run MLProject --env-manager=local

      - name: Commit artifacts
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add MLProject/mlruns/ MLProject/outputs/ || true
          git diff --staged --quiet || git commit -m "Auto update MLflow artifacts"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          MODEL_PATH=$(find MLProject/mlruns -name "MLmodel" | head -1 | xargs dirname)
          echo "Model path: $MODEL_PATH"
          mlflow models build-docker \
            --model-uri "$MODEL_PATH" \
            --name ${{ secrets.DOCKER_USERNAME }}/credit-risk-model:latest \
            --env-manager local

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/credit-risk-model:latest