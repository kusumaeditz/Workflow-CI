name: CI - MLflow Training & Docker

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          pip install mlflow==2.19.0 scikit-learn pandas numpy matplotlib seaborn

      # 4. Clean mlruns
      - name: Clean mlruns
        run: |
          rm -rf mlruns outputs

      # 5. Run training
      - name: Run Training
        run: |
          cd MLProject
          python modelling.py \
            --n_estimators 200 \
            --max_depth 0 \
            --min_samples_split 2

      # 6. Upload artifacts
      - name: Commit artifacts
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add MLProject/mlruns/ MLProject/outputs/ || true
          git diff --staged --quiet || git commit -m "Auto update MLflow artifacts"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

      # 7. Commit artifacts
      - name: Commit artifacts
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add MLProject/mlruns/ MLProject/outputs/ || true
          git diff --staged --quiet || git commit -m "Auto update MLflow artifacts"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

      # 8. Setup Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 9. Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 10. Build Docker Image
      - name: Build Docker Image
        run: |
          RUN_ID=$(ls MLProject/mlruns/0/ | grep -v meta | head -1)
          echo "Run ID: $RUN_ID"
          mlflow models build-docker \
            --model-uri "runs:/${RUN_ID}/model" \
            --name ${{ secrets.DOCKER_USERNAME }}/credit-risk-model:latest \
            --env-manager local

      # 11. Push Docker Image
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/credit-risk-model:latest